<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Ducor International Pharmacy</title>
  <link rel="icon" href="/assets/company-logo.jpg"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0d1b2a 0%,#162540 50%,#0d1b2a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:white;border-radius:24px;width:100%;max-width:440px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.4)}
    .card-top{background:linear-gradient(135deg,#0d1b2a,#162540);padding:40px 40px 32px;text-align:center}
    .logo-wrap{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:20px}
    .logo-wrap img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:3px solid rgba(201,160,85,.4)}
    .brand h1{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:white;letter-spacing:1px}
    .brand p{font-size:10px;color:#c9a055;letter-spacing:3px;text-transform:uppercase}
    .admin-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(201,160,85,.15);border:1px solid rgba(201,160,85,.3);border-radius:20px;padding:6px 16px;font-size:12px;color:#c9a055;font-weight:600}
    .card-body{padding:36px 40px 40px}
    .form-title{font-size:22px;font-weight:700;color:#0d1b2a;margin-bottom:6px}
    .form-sub{font-size:13px;color:#64748b;margin-bottom:28px}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:7px}
    .input-wrap{position:relative}
    .input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9ca3af;pointer-events:none}
    .form-group input{width:100%;padding:13px 14px 13px 42px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;font-family:inherit;color:#111827;background:#f9fafb;transition:border-color .2s,background .2s}
    .form-group input:focus{outline:none;border-color:#c9a055;background:white}
    .show-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;padding:4px}
    .btn-login{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#c9a055,#e8c97a);color:#0d1b2a;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .2s;margin-top:8px}
    .btn-login:hover{opacity:.9}
    .btn-login:active{transform:scale(.98)}
    .error-msg{display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:12px 16px;font-size:13px;color:#dc2626;margin-bottom:16px;align-items:center;gap:8px}
    .error-msg.show{display:flex}
    .security-note{margin-top:24px;padding:14px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;font-size:12px;color:#166534;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
    .divider{height:1px;background:#f3f4f6;margin:20px 0}
    .lock-icon{width:48px;height:48px;background:rgba(201,160,85,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
    .attempt-bar{height:3px;background:#e5e7eb;border-radius:2px;margin-top:20px;overflow:hidden}
    .attempt-fill{height:100%;width:0%;background:#dc2626;border-radius:2px;transition:width .4s}
  </style>
</head>
<body>

<div class="card">
  <div class="card-top">
    <div class="logo-wrap">
      <img src="/assets/company-logo.jpg" alt="Ducor"/>
      <div class="brand">
        <h1>DUCOR</h1>
        <p>International Pharmacy</p>
      </div>
    </div>
    <div class="lock-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c9a055" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div class="admin-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Admin Access Only
    </div>
  </div>

  <div class="card-body">
    <h2 class="form-title">Sign In</h2>
    <p class="form-sub">Enter your administrator credentials to access the dashboard.</p>

    <div class="error-msg" id="error-msg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-text">Invalid credentials. Please try again.</span>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" placeholder="admin@ducorpharmacy.com" required autocomplete="email"/>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" placeholder="••••••••••" required autocomplete="current-password" id="pw-input"/>
          <button type="button" class="show-pw" onclick="togglePw()" id="eye-btn">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        Sign In to Dashboard
      </button>
      <div class="attempt-bar"><div class="attempt-fill" id="attempt-fill"></div></div>
    </form>

    <div class="security-note">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      This area is restricted to authorized personnel only. All login attempts are logged and monitored. Unauthorized access is prohibited.
    </div>
  </div>
</div>

<script>
  window.handleLogin = function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');

    if (email === 'ducor.admin@ducorpharmacy.com' && password === 'Ducor@2025') {
      sessionStorage.setItem('ducor-admin', '1');
      sessionStorage.setItem('ducor-admin-email', email);
      sessionStorage.setItem('ducor-admin-login', Date.now());
      btn.textContent = '✓ Redirecting…';
      window.location.href = '/dashboard.html';
    } else {
      const err = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = 'Invalid email or password.';
      err.classList.add('show');
      setTimeout(() => err.classList.remove('show'), 4000);
    }
  };

  window.togglePw = function() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  };

  function showError(msg) {
    const el = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 5000);
  }
</script>
</body>
</html>
